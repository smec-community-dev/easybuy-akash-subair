<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | EasyBuy</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
"primary": "#2d5a27",
"primary-dark": "#1e3d1a",
"accent-terracotta": "#0ea5e9",
                        "background-light": "#fdfaf6",
                        "background-dark": "#1a1c19",
                        "surface-dark": "#232622",
                        "surface-light": "#ffffff",
                        "soft-gray": "#f3f4f1",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        :root {
            --primary-color: #2d5a27;
            --cream-bg: #fdfaf6;
        }
        .content-bg {
            background: linear-gradient(180deg, #f8f6f3 0%, #fdfaf6 100%);
        }
        .dark .content-bg {
            background: linear-gradient(180deg, #1a1c19 0%, #232622 100%);
        }
    </style>
</head>
<body class="font-display bg-[var(--cream-bg)] dark:bg-background-dark text-slate-800 dark:text-slate-100 antialiased selection:bg-primary selection:text-white">
<div class="flex flex-col min-h-screen">
    <!-- Header -->
    <header class="flex h-20 items-center justify-between border-b border-stone-200 dark:border-stone-800 bg-white/90 dark:bg-surface-dark/90 backdrop-blur-md px-4 lg:px-12 z-50 sticky top-0 shadow-sm">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-gradient-to-br from-primary to-primary-dark text-white shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined">shopping_bag</span>
                </div>
                <h1 class="text-xl font-black tracking-tight text-stone-900 dark:text-white">EasyBuy</h1>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <a href="{% url 'home' %}" class="text-sm font-medium text-stone-600 dark:text-stone-300 hover:text-primary transition-colors">
                Back to Home
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 content-bg flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md">
            <!-- Login Card -->
            <div class="bg-white/60 dark:bg-surface-dark/60 backdrop-blur-sm rounded-3xl border border-stone-200 dark:border-stone-700 shadow-lg p-8">
                <!-- Header -->
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-black text-stone-900 dark:text-white">Welcome Back</h1>
                    <p class="mt-2 text-stone-500 dark:text-stone-400">Sign in to your EasyBuy account</p>
                </div>

                <!-- Error Message -->
                {% if error %}
                <div class="bg-red-100 dark:bg-red-900/30 border border-red-400 text-red-700 dark:text-red-400 px-4 py-3 rounded-2xl mb-6">
                    <p class="text-sm font-medium">{{ error }}</p>
                </div>
                {% endif %}

                <!-- Login Form -->
                <form method="POST" action="{% url 'all_login' %}" class="space-y-6">
                    {% csrf_token %}
                    
                    <!-- Username -->
                    <div>
                        <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1.5">Username</label>
                        <input name="username" 
                            class="w-full px-4 py-2.5 bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded-xl text-stone-900 dark:text-white placeholder:text-stone-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" 
                            placeholder="Enter your username" 
                            type="text" required/>
                    </div>
                    
                    <!-- Password -->
                    <div>
                        <div class="flex items-center justify-between mb-1.5">
                            <label class="text-sm font-medium text-stone-700 dark:text-stone-300">Password</label>
                            <a class="text-sm text-primary hover:underline" href="#">Forgot?</a>
                        </div>
                        <input name="password" 
                            class="w-full px-4 py-2.5 bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded-xl text-stone-900 dark:text-white placeholder:text-stone-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" 
                            placeholder="Enter your password" 
                            type="password" required/>
                    </div>
                    
                    <!-- Remember Me -->
                    <div class="flex items-center gap-2">
                        <input class="w-4 h-4 rounded border-stone-300 text-primary focus:ring-primary" id="remember" type="checkbox"/>
                        <label class="text-sm text-stone-600 dark:text-stone-400" for="remember">Remember me</label>
                    </div>
                    
                    <!-- Submit Button -->
                    <button type="submit" class="w-full bg-gradient-to-r from-primary to-primary-dark hover:from-primary-dark hover:to-primary text-white font-bold py-3 rounded-2xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">login</span>
                        Sign In
                    </button>
                </form>

                <!-- Sign Up Link -->
                <p class="mt-6 text-center text-sm text-stone-600 dark:text-stone-400">
                    Don't have an account? 
                    <a href="{% url 'register' %}" class="font-bold text-primary hover:underline transition-colors">Sign Up</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-stone-200 dark:border-stone-800 bg-white dark:bg-surface-dark py-8">
        <div class="mx-auto max-w-7xl px-4 text-center">
            <p class="text-xs text-stone-400">© 2026 EasyBuy Inc. All rights reserved.</p>
        </div>
    </footer>
</div>
</body>
</html>
