<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        input[type="text"],
        input[type="password"],
        input[type="file"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        
        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="file"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* Custom file input styling */
        input[type="file"] {
            padding: 10px;
            background: #f9f9f9;
            cursor: pointer;
        }
                .file-upload-wrapper {
            position: relative;
        }
        
        .file-hint {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 25px;
            }
        }
        
        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏪 Seller Registration</h1>
        
        <!-- Added enctype for file upload -->
        <form method="POST" action="{% url 'selleregi' %}" enctype="multipart/form-data">
            {% csrf_token %}
            
            <!-- Account Information -->
            <div class="form-group">
                <label for="username">Username *</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            
            <!-- Store Information -->
            <div class="form-group">
                <label for="store_name">Store Name *</label>
                <input type="text" id="store_name" name="store_name" required placeholder="Enter your store name">
            </div>
            
            <!-- Tax Information -->
            <div class="form-row">
                <div class="form-group">
                    <label for="gst_number">GST Number *</label>
                    <input type="text" id="gst_number" name="gst_number" required placeholder="e.g., 22AAAAA0000A1Z5">
                </div>
                
                <div class="form-group">
                    <label for="pan_number">PAN Number *</label>
                    <input type="text" id="pan_number" name="pan_number" required placeholder="e.g., AAAAA1234A">
                </div>
            </div>
            
            <!-- Bank Information -->
            <div class="form-row">
                <div class="form-group">
                    <label for="bank_account_number">Bank Account Number *</label>
                    <input type="text" id="bank_account_number" name="bank_account_number" required placeholder="Enter account number">
                </div>
                
                <div class="form-group">
                    <label for="ifsc_code">IFSC Code *</label>
                    <input type="text" id="ifsc_code" name="ifsc_code" required placeholder="e.g., SBIN0001234">
                </div>
            </div>
            
            <!-- Business Address -->
            <div class="form-group">
                <label for="business_address">Business Address *</label>
                <input type="text" id="business_address" name="business_address" required placeholder="Enter your business address">
            </div>
            
            <!-- NEW: Document Upload Field -->
            <div class="form-group">
                <label for="doc">Upload Document *</label>
                <div class="file-upload-wrapper">
                    <input type="file" id="doc" name="doc" required accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
                    <p class="file-hint">Accepted formats: PDF, JPG, PNG, DOC (Max size: 5MB)</p>
                </div>
            </div>
                        <button type="submit" class="btn-submit">Register as Seller</button>
        </form>
        
        <p class="info-text">Your account will be reviewed by admin for approval.</p>
    </div>
</body>
</html>
