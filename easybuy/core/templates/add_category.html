<!-- add_category.html - CORRECTED -->
<!DOCTYPE html>
<html>
<head>
    <title>Add Category</title>
</head>
<body>
    <h2>Add Category</h2>
    
    <form method="POST" enctype="multipart/form-data" action="{% url 'add_category' %}">
        {% csrf_token %}
        
        <input type="text" name="name" placeholder="Name" required><br><br>
        <input type="text" name="slug" placeholder="Slug" required><br><br>
        <input type="file" name="image_url" accept="image/*"><br><br>
        <textarea name="des" placeholder="Description"></textarea><br><br>
        
        <button type="submit">Submit</button>
    </form>
</body>
</html>
